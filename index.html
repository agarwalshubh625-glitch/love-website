<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shrutiiii ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
}

.container {
  padding: 20px;
}

h1 { font-size: 8vw; color: white; }
h2 { font-size: 6vw; color: white; }

#typingText {
  font-size: 5vw;
  color: white;
  min-height: 60px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  font-size: 4.5vw;
  cursor: pointer;
}

#yes { background: #4CAF50; color: white; }
#no { background: #f44336; color: white; position: absolute; }

@media (min-width: 600px) {
  h1 { font-size: 40px; }
  h2 { font-size: 28px; }
  #typingText { font-size: 20px; }
  button { font-size: 18px; }
}

.heart {
  position: absolute;
  background: rgba(255, 0, 85, 0.9);
  color: white;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Shrutiiii 🐼 ❤️</h1>
  <p id="typingText"></p>
  <h2>Will you forgive me?</h2>

  <button id="yes" onclick="startLove()">Yes ❤️</button>
  <button id="no" onclick="moveNo()">No 😜</button>
</div>

<!-- 🎁 Secret button -->
<button onclick="secret()" 
style="position:fixed;top:10px;right:10px;opacity:0.2;">
🎁
</button>

<script>
// Typing effect
const text = "Shrutiiii 🐼... I am really sorry 😔 I love you more than anything ❤️ Please forgive me 🥺";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typingText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  }
}
typeEffect();

// Messages
const messages = [
  "I love you Shrutiiii ❤️",
  "Sorry baby 🥺",
  "My panda 🐼❤️",
  "Please forgive me 😔",
  "You are my everything 💖"
];

// YES click
function startLove() {
  document.body.innerHTML = "<h1 style='color:white;margin-top:40%;'>I LOVE YOU SHRUTIIII 🐼❤️🥰</h1>";

  const msgs = ["I love you 💖","Sorry jaan 🥺","My panda 🐼","Forever us ❤️"];

  setInterval(() => {
    let msg = document.createElement("div");
    msg.innerText = msgs[Math.floor(Math.random()*msgs.length)];
    msg.style.position = "absolute";
    msg.style.left = Math.random()*100 + "vw";
    msg.style.top = "-20px";
    msg.style.color = "white";
    msg.style.fontSize = "20px";

    document.body.appendChild(msg);

    let fall = setInterval(()=>{
      msg.style.top = (msg.offsetTop + 5) + "px";
    },50);

    setTimeout(()=>{
      msg.remove();
      clearInterval(fall);
    },3000);

  },300);
}

// NO button upgrade 😜
let scale = 1;
function moveNo() {
  let btn = document.getElementById("no");

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  btn.style.left = x + "px";
  btn.style.top = y + "px";

  scale -= 0.1;
  btn.style.transform = "scale(" + scale + ")";
  btn.innerText = "Pakad ke dikha 😜";
}

// 🎁 Secret Love Letter
function secret(){
  document.body.innerHTML = `
  <div style="color:white;padding:30px;text-align:left;">
    <h1>For You 🐼❤️</h1>
    <p style="font-size:18px;line-height:1.6;">
      I know I made mistakes... 😔<br><br>
      But trust me, I never meant to hurt you.<br><br>
      You are the best thing that ever happened to me 💖<br><br>
      And I promise, I’ll do better… for us ❤️<br><br>
      Please don’t stay mad… I really love you 🥺
    </p>
  </div>`;
}
</script>

</body>
</html>
